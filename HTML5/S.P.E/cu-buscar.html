<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>S.P.E. - Buscar Computadora</title>
    <link rel="icon" href="img/LogoSPE.ico">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <div class="contenedor-video">
        <video autoplay muted loop playsinline><source src="media/FondoPaginaWeb.mp4" type="video/mp4"></video>
    </div>

    <header class="navbar">
        <div class="nav-container">
            <a class="nav-logo">💻 BUSCAR COMPUTADORAS</a>
        </div>
    </header>

    <main class="main-content">
        <div class="cu-container">
            <h2>Buscar Computadora/s</h2>
            <p style="color:var(--text-muted); margin-bottom:1.5rem;">Introduce los criterios técnicos para filtrar las unidades.</p>
            
            <input type="text" id="query" placeholder="Ej: Hp, Conectar Igualdad, Lenovo...">
            <button class="btn btn-primary" style="width:100%; margin-bottom:1rem;" onclick="buscar()">Ejecutar Búsqueda</button>
            <a href="menu.html" class="btn btn-secondary" style="display:block;">Volver al Menú</a>
        </div>
    </main>
    <script>
        function buscar() {
            alert("Búsqueda simulada con éxito para " + document.getElementById('query').value);
        }
    </script>
</body>
</html>
